server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    # File-mode H2 with AUTO_SERVER=TRUE so vendor-service (port 8082) can
    # connect to the same database concurrently.  Start auth-service first.
    url: jdbc:h2:file:~/thalicloud-data/thalidb;AUTO_SERVER=TRUE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create    # drops + recreates schema on every auth-service start
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  # 256-bit Base64-encoded secret — change before going to production
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  access-token-expiry-ms: 900000      # 15 min
  refresh-token-expiry-ms: 604800000  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.thalicloud: DEBUG
    org.springframework.security: INFO
